# -----------------------------------------------------------------
# paranoid-passwd -- CD Pipeline
#
# RUNS ON: push:main, release:published
#
# RESPONSIBILITIES:
#   - On push:main:
#       1. Build & sign Wolfi apk (melange) + OCI image (apko) + cosign
#       2. Push image to ghcr.io
#       3. Run double-compilation reproducible-build check
#       4. release-please (opens / updates / merges release PRs)
#   - On release:published (paranoid-passwd-v*):
#       5. Extract site bundle from the just-built apk
#       6. Deploy site to GitHub Pages
#       7. Attach versioned site/wasm assets + SHA256SUMS to the release
#
# CONSOLIDATION:
#   This file absorbs everything from the deleted release.yml. The
#   cli-release.yml workflow (handling the cross-compile CLI tarballs
#   and sigstore attestation) is now release.yml.
#
# SUPPLY CHAIN MODEL:
#   Toolchain runs inside the Wolfi-pinned builder action at
#   .github/actions/builder/. melange + apko + crane + cosign are
#   the only tools NOT in the builder (they need full host capabilities).
# -----------------------------------------------------------------

name: CD

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  MELANGE_VERSION: "0.43.3"
  APKO_VERSION: "1.1.11"
  CRANE_VERSION: "0.20.2"

jobs:

  # ---------------------------------------------------------------
  # JOB 1: Build with melange + apko, sign with Cosign
  #
  # Runs on every push:main AND on release:published so the deploy
  # job has a fresh artifact set to operate on regardless of trigger.
  # ---------------------------------------------------------------
  build:
    name: Build + Sign (melange/apko)
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    outputs:
      image-digest: ${{ steps.apko-build.outputs.digest }}
      wasm-sha256: ${{ steps.extract.outputs.wasm-sha256 }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install melange + apko + crane
        env:
          MELANGE_V: ${{ env.MELANGE_VERSION }}
          APKO_V: ${{ env.APKO_VERSION }}
          CRANE_V: ${{ env.CRANE_VERSION }}
        run: |
          curl -sSL "https://github.com/chainguard-dev/melange/releases/download/v${MELANGE_V}/melange_${MELANGE_V}_linux_amd64.tar.gz" | tar -xz --strip-components=1
          sudo mv melange /usr/local/bin/
          melange version

          curl -sSL "https://github.com/chainguard-dev/apko/releases/download/v${APKO_V}/apko_${APKO_V}_linux_amd64.tar.gz" | tar -xz --strip-components=1
          sudo mv apko /usr/local/bin/
          apko version

          curl -sSL "https://github.com/google/go-containerregistry/releases/download/v${CRANE_V}/go-containerregistry_Linux_x86_64.tar.gz" | tar -xz crane
          sudo mv crane /usr/local/bin/

      - name: Generate melange signing key
        run: melange keygen

      - name: Build package with melange
        run: |
          melange build melange.yaml \
              --signing-key melange.rsa \
              --arch x86_64 \
              --out-dir packages/ \
              --runner docker

      - name: Build OCI image with apko
        id: apko-build
        env:
          IMAGE_TAG: ${{ github.event.release.tag_name || 'latest' }}
        run: |
          apko build apko.yaml \
              "paranoid-passwd:${IMAGE_TAG}" \
              output.tar \
              --keyring-append melange.rsa.pub \
              --repository-append packages/

          DIGEST=$(crane digest --tarball output.tar 2>/dev/null || echo "local-build")
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Extract site artifacts from package
        id: extract
        run: |
          mkdir -p artifact/site

          APK_FILE=$(find packages/ -name '*.apk' -type f | head -1)
          if [ -z "${APK_FILE}" ]; then
              echo "ERROR: no .apk produced by melange" >&2
              exit 1
          fi

          mkdir -p /tmp/apk-extract
          tar -xzf "${APK_FILE}" -C /tmp/apk-extract 2>/dev/null || true

          if [ -d /tmp/apk-extract/usr/share/paranoid-passwd/site ]; then
              cp -r /tmp/apk-extract/usr/share/paranoid-passwd/site/* artifact/site/
          fi
          if [ -f /tmp/apk-extract/usr/share/paranoid-passwd/site/paranoid.wasm ]; then
              cp /tmp/apk-extract/usr/share/paranoid-passwd/site/paranoid.wasm artifact/
          fi

          if [ ! -f artifact/paranoid.wasm ]; then
              echo "ERROR: paranoid.wasm not extracted from apk" >&2
              exit 1
          fi

          WASM_SHA256=$(sha256sum artifact/paranoid.wasm | cut -d' ' -f1)
          echo "wasm-sha256=${WASM_SHA256}" >> "$GITHUB_OUTPUT"
          echo "WASM SHA-256: ${WASM_SHA256}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push OCI image
        env:
          IMAGE_TAG: ${{ github.event.release.tag_name || 'latest' }}
          REG: ${{ env.REGISTRY }}
          IMG: ${{ env.IMAGE_NAME }}
          SHA: ${{ github.sha }}
        run: |
          crane push output.tar "${REG}/${IMG}:${IMAGE_TAG}"
          if [ "${IMAGE_TAG}" != "latest" ]; then
              crane push output.tar "${REG}/${IMG}:latest"
          fi
          crane push output.tar "${REG}/${IMG}:${SHA}"

      - name: Sign container image with Cosign
        if: steps.apko-build.outputs.digest != 'local-build'
        env:
          IMAGE_TAG: ${{ github.event.release.tag_name || 'latest' }}
          REG: ${{ env.REGISTRY }}
          IMG: ${{ env.IMAGE_NAME }}
        run: |
          cosign sign --yes "${REG}/${IMG}:${IMAGE_TAG}"

      - name: Upload site artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: paranoid-site
          path: artifact/site/
          retention-days: 90

      - name: Upload WASM binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: paranoid-wasm
          path: artifact/paranoid.wasm
          retention-days: 90

  # ---------------------------------------------------------------
  # JOB 2: Double Compilation (Reproducible Build Check)
  #
  # Runs only on push:main. Skipped for release events to keep the
  # release deploy fast.
  # ---------------------------------------------------------------
  double-compile:
    name: Double Compilation
    runs-on: ubuntu-24.04
    if: github.event_name == 'push'

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run double compilation check inside Wolfi builder
        uses: ./.github/actions/builder
        with:
          run: ./scripts/double_compile.sh

  # ---------------------------------------------------------------
  # JOB 3: Multi-Party Verify (release branches only)
  # ---------------------------------------------------------------
  multiparty-verify:
    name: Multi-Party Verify
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/heads/release-')

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run multi-party verification
        run: ./scripts/multiparty_verify.sh check
        continue-on-error: true

  # ---------------------------------------------------------------
  # JOB 4: Release Please (push:main only)
  # ---------------------------------------------------------------
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    needs: [build, double-compile]
    if: github.event_name == 'push'

    permissions:
      contents: write
      pull-requests: write

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          token: ${{ secrets.CI_GITHUB_TOKEN }}

  # ---------------------------------------------------------------
  # JOB 5: Deploy to GitHub Pages (release:published only)
  #
  # Folded in from the deleted release.yml.
  # ---------------------------------------------------------------
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-24.04
    needs: [build]
    if: github.event_name == 'release'

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download site
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: paranoid-site
          path: _site

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  # ---------------------------------------------------------------
  # JOB 6: Upload site / WASM assets to the release
  # (release:published only)
  #
  # Folded in from the deleted release.yml. The cross-compiled CLI
  # binaries are uploaded by the separate release.yml (formerly
  # cli-release.yml) workflow on the same trigger.
  # ---------------------------------------------------------------
  upload-release-assets:
    name: Upload Release Assets
    runs-on: ubuntu-24.04
    needs: [build]
    if: github.event_name == 'release'

    permissions:
      contents: write

    steps:
      - name: Download WASM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: paranoid-wasm

      - name: Download site
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: paranoid-site
          path: site

      - name: Create release archive
        env:
          RELEASE_VERSION: ${{ github.event.release.tag_name }}
        run: |
          cp paranoid.wasm "paranoid-${RELEASE_VERSION}.wasm"
          cd site && zip -r "../paranoid-site-${RELEASE_VERSION}.zip" . && cd ..
          sha256sum \
              paranoid.wasm \
              "paranoid-${RELEASE_VERSION}.wasm" \
              "paranoid-site-${RELEASE_VERSION}.zip" \
              > SHA256SUMS-site.txt

      - name: Upload assets to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            paranoid-${{ github.event.release.tag_name }}.wasm
            paranoid-site-${{ github.event.release.tag_name }}.zip
            SHA256SUMS-site.txt
