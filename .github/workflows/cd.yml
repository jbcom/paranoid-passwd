# -----------------------------------------------------------------
# paranoid-passwd — CD (push to main)
#
# RUNS ON: push to main, weekly Scorecard schedule.
# PURPOSE: deploy what release.yml has already built and shipped.
#
# Topology: ci → release → cd.
#   ci.yml verifies PRs; release.yml produces versioned artifacts on
#   each release-please tag; cd.yml fetches the latest release's
#   site artifact and deploys it to GitHub Pages.
#
# Also folds in the release-please action (so a merge to main opens
# or updates the release PR) and OpenSSF Scorecard (weekly + on push).
# -----------------------------------------------------------------

name: CD

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday 6am UTC — Scorecard
  workflow_dispatch:

permissions: {}

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Release Please (opens/updates release PR) ─────────────────
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    if: github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          token: ${{ secrets.CI_GITHUB_TOKEN }}

  # ─── Deploy site from latest release ───────────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-24.04
    if: github.event_name == 'push'
    needs: release-please
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (for CNAME fallback)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve latest release tag
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Use the most recent release tag (release.yml uploads
          # paranoid-site-${ver}.zip to every release).
          tag=$(gh release view --repo "${GH_REPO}" --json tagName --jq '.tagName' 2>/dev/null || echo "")
          if [ -z "${tag}" ]; then
            echo "No release yet — skipping Pages deploy"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download site zip from latest release
        if: steps.latest.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ steps.latest.outputs.tag }}
        run: |
          ver="${TAG#paranoid-passwd-v}"
          gh release download "${TAG}" \
              --repo "${GH_REPO}" \
              -p "paranoid-site-${ver}.zip"
          mkdir -p _site
          unzip -q "paranoid-site-${ver}.zip" -d _site

      - name: Configure Pages
        if: steps.latest.outputs.skip != 'true'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        if: steps.latest.outputs.skip != 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

      - name: Deploy
        if: steps.latest.outputs.skip != 'true'
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  # ─── OpenSSF Scorecard ─────────────────────────────────────────
  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 14

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: results.sarif

  # ─── CodeQL on main (scheduled) ────────────────────────────────
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [c-cpp, javascript]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
      - name: Analyze
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          category: "/language:${{ matrix.language }}"
