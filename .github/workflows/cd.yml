name: CD

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions: {}

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    if: github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Run release-please
        id: release-please
        continue-on-error: true
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.CI_GITHUB_TOKEN }}

      - name: Report release-please branch protection block
        if: steps.release-please.outcome == 'failure'
        shell: bash
        run: |
          echo "::warning::release-please could not update its generated branch under the current repository rules. The verified release workflow remains the release authority."

  deploy-pages:
    name: Deploy Docs to GitHub Pages
    # Tier B-adjacent (id-token:write, publishes to GitHub Pages). Per
    # docs/reference/ci-design.md's P6.4 boundary: this job MUST NOT
    # restore any PR-writable cache. It intentionally has no actions/cache
    # step and always builds the docs venv fresh from the digest-pinned
    # builder image — only ci.yml's PR-side docs job (contents:read, no
    # OIDC token) caches the tox/Sphinx virtualenvs.
    runs-on: ubuntu-24.04
    if: github.event_name == 'push'
    needs: release-please
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build docs site from the repository root (fresh, no cache)
        uses: ./.github/actions/builder
        with:
          run: |
            python3 -m tox -e docs

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/_build/html

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [rust, python]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml
      - name: Autobuild
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      - name: Analyze
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
