# -----------------------------------------------------------------
# paranoid-passwd -- CLI Cross-Compile Release Pipeline
#
# RUNS ON: A release-please-published release whose tag matches
#          paranoid-passwd-v*
# PURPOSE: Build the `paranoid-passwd` CLI for linux/{amd64,arm64}
#          and darwin/{amd64,arm64} using Zig as the cross-compiler,
#          package each target as a tarball, compute SHA-256 checksums,
#          attest build provenance via sigstore (SLSA), and attach
#          everything to the release.
#
# SUPPLY CHAIN SECURITY:
#   - All GitHub Actions pinned by commit SHA (not tag)
#   - Zig toolchain version pinned via env var
#   - Binary is fully static (musl) for Linux; libSystem-dynamic on macOS
#   - Attestations are sigstore-signed and rekor-logged
#   - All untrusted inputs go through env: with quoted shell access
#   - Checksums published alongside artifacts
# -----------------------------------------------------------------

name: CLI Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. paranoid-passwd-v3.2.0)'
        required: true
        type: string

permissions: {}

env:
  # Same Zig version as ci.yml to keep toolchain consistent.
  ZIG_VERSION: "0.13.0"
  # SHA-256 of zig-linux-x86_64-${ZIG_VERSION}.tar.xz, published by
  # ziglang.org at https://ziglang.org/download/index.json. Pinned
  # here so a compromised mirror or MITM cannot inject a different
  # toolchain. Update in lockstep with ZIG_VERSION.
  ZIG_SHA256: "d45312e61ebcc48032b77bc4cf7fd6915c11fa16e4aad116b66c9468211230ea"

jobs:
  build:
    name: Build ${{ matrix.target_os }}/${{ matrix.target_arch }}
    # Skip when this workflow is triggered by a release that isn't ours.
    if: >
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.release.tag_name, 'paranoid-passwd-v')
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - target_os: linux
            target_arch: amd64
            zig_triple: x86_64-linux-musl
          - target_os: linux
            target_arch: arm64
            zig_triple: aarch64-linux-musl
          - target_os: darwin
            target_arch: amd64
            zig_triple: x86_64-macos-none
          - target_os: darwin
            target_arch: arm64
            zig_triple: aarch64-macos-none

    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          persist-credentials: false

      - name: Install Zig (SHA-verified)
        env:
          ZIG_VERSION_ENV: ${{ env.ZIG_VERSION }}
          ZIG_SHA256_ENV: ${{ env.ZIG_SHA256 }}
        run: |
          archive="zig-linux-x86_64-${ZIG_VERSION_ENV}.tar.xz"
          curl -sSLO "https://ziglang.org/download/${ZIG_VERSION_ENV}/${archive}"
          echo "${ZIG_SHA256_ENV}  ${archive}" | sha256sum -c -
          tar -xJf "${archive}"
          rm "${archive}"
          echo "$PWD/zig-linux-x86_64-${ZIG_VERSION_ENV}" >> "$GITHUB_PATH"

      - name: Install CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake

      - name: Extract version from tag
        id: ver
        env:
          RAW_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          # Tags look like "paranoid-passwd-v3.2.0" -> "3.2.0"
          version="${RAW_TAG#paranoid-passwd-v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Resolve checked-out commit
        id: commit
        # github.sha refers to the workflow trigger commit, which on a
        # `release: published` event is the release commit, not always
        # the tag's underlying commit. Read HEAD directly so the binary
        # reports the SHA of the source it was actually built from.
        run: |
          sha=$(git rev-parse HEAD)
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - name: Configure (CMake via Zig cross-toolchain)
        env:
          ZIG_TRIPLE: ${{ matrix.zig_triple }}
          BUILD_COMMIT: ${{ steps.commit.outputs.sha }}
        run: |
          cmake -B build/cli \
              -DCMAKE_TOOLCHAIN_FILE=cmake/zig-cross.cmake \
              -DPARANOID_TARGET="${ZIG_TRIPLE}" \
              -DPARANOID_BUILD_COMMIT="${BUILD_COMMIT}" \
              -DCMAKE_BUILD_TYPE=Release

      - name: Build CLI
        run: cmake --build build/cli --target paranoid_cli

      - name: Verify binary
        env:
          TARGET_OS: ${{ matrix.target_os }}
          TARGET_ARCH: ${{ matrix.target_arch }}
        run: |
          bin=build/cli/paranoid-passwd
          file "${bin}"
          size=$(stat -c%s "${bin}")
          echo "size: ${size} bytes (${TARGET_OS}/${TARGET_ARCH})"

      - name: Package
        id: pkg
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          TARGET_OS: ${{ matrix.target_os }}
          TARGET_ARCH: ${{ matrix.target_arch }}
        run: |
          stage="paranoid-passwd-${VERSION}-${TARGET_OS}-${TARGET_ARCH}"
          mkdir -p "stage/${stage}"
          cp build/cli/paranoid-passwd "stage/${stage}/"
          # LICENSE and README must be present in every release tarball.
          # Failing here is the right outcome if either is missing.
          cp LICENSE "stage/${stage}/"
          cp README.md "stage/${stage}/"

          tarball="${stage}.tar.gz"
          tar -C stage -czf "${tarball}" "${stage}"

          sha256sum "${tarball}" > "${tarball}.sha256"
          echo "artifact=${tarball}" >> "$GITHUB_OUTPUT"

      - name: Upload intermediate artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: |
            ${{ steps.pkg.outputs.artifact }}
            ${{ steps.pkg.outputs.artifact }}.sha256
          retention-days: 7

  sign-and-release:
    name: Attest and publish
    needs: build
    runs-on: ubuntu-24.04
    if: >
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.release.tag_name, 'paranoid-passwd-v')

    permissions:
      contents: write       # upload release assets
      id-token: write       # sigstore OIDC
      attestations: write   # actions/attest-build-provenance

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download all CLI artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: cli-dist
          merge-multiple: true

      - name: Build combined checksums
        run: |
          cd cli-dist
          cat ./*.sha256 > checksums.txt
          rm -f ./*.sha256
          echo "--- checksums.txt ---"
          cat checksums.txt

      - name: Attest build provenance (all tarballs)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            cli-dist/*.tar.gz

      - name: Attest build provenance (checksums.txt)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: cli-dist/checksums.txt

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RAW_TAG: ${{ github.event.release.tag_name || inputs.tag }}
          GH_REPO: ${{ github.repository }}
        run: |
          cd cli-dist
          gh release upload "${RAW_TAG}" \
              ./*.tar.gz checksums.txt \
              --repo "${GH_REPO}" \
              --clobber
