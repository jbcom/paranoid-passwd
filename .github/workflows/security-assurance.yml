name: Security Assurance

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: security-assurance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  assurance:
    name: Security Assurance
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      # `make ci` (ci.yml's "Rust Build + Tests" job) already runs
      # `make verify-assurance` (hallucination_check.sh, supply_chain_verify.sh,
      # verify_ai_review_inventory.sh, and an un-scoped security_assurance_gate.py
      # run) on the same PR. This job's unique value is ONLY the base-ref-diffed
      # security_assurance_gate.py run plus its report artifact — do not
      # re-run verify-assurance here.
      - name: Run base-ref-diffed security assurance gate inside the builder
        uses: ./.github/actions/builder
        env:
          SECURITY_ASSURANCE_BASE_REF: origin/${{ github.base_ref || 'main' }}
        with:
          run: |
            python3 scripts/security_assurance_gate.py \
              --base-ref "$SECURITY_ASSURANCE_BASE_REF" \
              --json-out dist/security-assurance-report.json \
              --markdown-out dist/security-assurance-report.md

      - name: Upload security assurance report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-assurance-report
          path: |
            dist/security-assurance-report.json
            dist/security-assurance-report.md
          if-no-files-found: error
