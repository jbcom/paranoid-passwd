    steps:
      - name: Checkout (for smoke scripts)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          persist-credentials: false

      - name: Download + verify release asset (Linux)
        if: runner.os == 'Linux'
        uses: ./.github/actions/builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RAW_TAG: ${{ github.event.release.tag_name || inputs.tag }}
          OWNER: ${{ github.repository_owner }}
          RUNNABLE: ${{ matrix.runnable }}
        with:
          run: |
            ver="${RAW_TAG#paranoid-passwd-v}"
            if [ '${{ matrix.deb }}' = 'true' ]; then
              artifact="${{ matrix.product_name }}_${ver}_${{ matrix.target_arch }}.deb"
            else
              artifact="${{ matrix.product_name }}-${ver}-${{ matrix.asset_suffix }}"
            fi
            gh release download "${RAW_TAG}" -p "${artifact}" -p checksums.txt --repo "${GH_REPO}"
            gh attestation verify "${artifact}" --owner "${OWNER}"
            checksum_line="$(awk -v artifact="${artifact}" '$2 == artifact { print; found = 1 } END { if (!found) exit 1 }' checksums.txt)"
            if command -v sha256sum >/dev/null 2>&1; then
              printf '%s\n' "${checksum_line}" | sha256sum -c -
            else
              printf '%s\n' "${checksum_line}" | shasum -a 256 -c -
            fi
            bash scripts/verify_platform_signing.sh \
              --mode "${PARANOID_RELEASE_SIGNING_MODE:-unsigned}" \
              --artifact "${artifact}" \
              --product '${{ matrix.product_name }}'
            if [ "${RUNNABLE}" = "true" ]; then
              bash scripts/smoke_test_release_artifact.sh "${ver}" '${{ matrix.target_os }}' '${{ matrix.target_arch }}' "${artifact}" '${{ matrix.product_name }}'
            fi

      - name: Download + verify release asset (non-Linux)
