# -----------------------------------------------------------------
# paranoid-passwd — Release (release-please tag)
#
# RUNS ON: release-please published a release whose tag matches
#          paranoid-passwd-v*.
# PURPOSE: produce every versioned artifact, attest it, upload to the
#          release, and push Homebrew/Scoop/Chocolatey manifests to
#          jbcom/pkgs + jbcom/homebrew-tap.
#
# Topology: ci → release → cd.
#   ci.yml verifies PRs; release.yml ships artifacts; cd.yml deploys
#   those already-shipped artifacts (Pages) from the latest release.
# -----------------------------------------------------------------

name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. paranoid-passwd-v3.4.2)'
        required: true
        type: string

permissions: {}

jobs:

  # ─── CLI cross-compile matrix (5 targets) ──────────────────────
  build-cli:
    name: Build CLI ${{ matrix.target_os }}/${{ matrix.target_arch }}
    if: >
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.release.tag_name, 'paranoid-passwd-v')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_os: linux
            target_arch: amd64
            zig_triple: x86_64-linux-musl
            ext: ''
            archive: tar.gz
          - target_os: linux
            target_arch: arm64
            zig_triple: aarch64-linux-musl
            ext: ''
            archive: tar.gz
          - target_os: darwin
            target_arch: amd64
            zig_triple: x86_64-macos-none
            ext: ''
            archive: tar.gz
          - target_os: darwin
            target_arch: arm64
            zig_triple: aarch64-macos-none
            ext: ''
            archive: tar.gz
          - target_os: windows
            target_arch: amd64
            zig_triple: x86_64-windows-gnu
            ext: '.exe'
            archive: zip

    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          persist-credentials: false

      - name: Extract version
        id: ver
        env:
          RAW_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: echo "version=${RAW_TAG#paranoid-passwd-v}" >> "$GITHUB_OUTPUT"

      - name: Resolve commit SHA
        id: commit
        # release: published fires on the release commit; HEAD of the
        # checked-out tag is the source of truth for the binary's version.
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cross-compile inside Wolfi builder
        uses: ./.github/actions/builder
        env:
          ZIG_TRIPLE: ${{ matrix.zig_triple }}
          BUILD_COMMIT: ${{ steps.commit.outputs.sha }}
        with:
          run: |
            cmake -B build/cli \
                -DCMAKE_TOOLCHAIN_FILE=cmake/zig-cross.cmake \
                -DPARANOID_TARGET="${ZIG_TRIPLE}" \
                -DPARANOID_BUILD_COMMIT="${BUILD_COMMIT}" \
                -DCMAKE_BUILD_TYPE=Release
            cmake --build build/cli --target paranoid_cli

      - name: Package
        id: pkg
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          TARGET_OS: ${{ matrix.target_os }}
          TARGET_ARCH: ${{ matrix.target_arch }}
          EXT: ${{ matrix.ext }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          stage="paranoid-passwd-${VERSION}-${TARGET_OS}-${TARGET_ARCH}"
          mkdir -p "stage/${stage}"
          cp "build/cli/paranoid-passwd${EXT}" "stage/${stage}/"
          cp LICENSE README.md "stage/${stage}/"

          if [ "${ARCHIVE}" = "zip" ]; then
            artifact="${stage}.zip"
            (cd stage && zip -r "../${artifact}" "${stage}" >/dev/null)
          else
            artifact="${stage}.tar.gz"
            tar -C stage -czf "${artifact}" "${stage}"
          fi

          sha256sum "${artifact}" > "${artifact}.sha256"
          echo "artifact=${artifact}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: |
            ${{ steps.pkg.outputs.artifact }}
            ${{ steps.pkg.outputs.artifact }}.sha256
          retention-days: 7

  # ─── Site + WASM artifacts via melange/apko ────────────────────
  build-site:
    name: Build Site + WASM (melange/apko)
    if: >
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.release.tag_name, 'paranoid-passwd-v')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    outputs:
      wasm-sha256: ${{ steps.extract.outputs.wasm-sha256 }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          persist-credentials: false

      - name: Install melange/apko/crane (curl + SHA would be nicer; these
          releases don't publish checksums consistently)
        run: |
          MELANGE_VERSION="0.43.3"
          curl -sSL "https://github.com/chainguard-dev/melange/releases/download/v${MELANGE_VERSION}/melange_${MELANGE_VERSION}_linux_amd64.tar.gz" | tar -xz --strip-components=1
          sudo mv melange /usr/local/bin/
          APKO_VERSION="1.1.11"
          curl -sSL "https://github.com/chainguard-dev/apko/releases/download/v${APKO_VERSION}/apko_${APKO_VERSION}_linux_amd64.tar.gz" | tar -xz --strip-components=1
          sudo mv apko /usr/local/bin/
          CRANE_VERSION="0.20.2"
          curl -sSL "https://github.com/google/go-containerregistry/releases/download/v${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz" | tar -xz crane
          sudo mv crane /usr/local/bin/

      - name: Build melange package
        run: |
          melange keygen
          melange build melange.yaml \
              --signing-key melange.rsa \
              --arch x86_64 \
              --out-dir packages/ \
              --runner docker

      - name: Build OCI image with apko
        env:
          RELEASE_VERSION: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          apko build apko.yaml \
              "paranoid-passwd:${RELEASE_VERSION}" \
              output.tar \
              --keyring-append melange.rsa.pub \
              --repository-append packages/

      - name: Extract site + WASM
        id: extract
        run: |
          mkdir -p artifact/site
          APK_FILE=$(find packages/ -name '*.apk' -type f | head -1)
          if [ -n "$APK_FILE" ]; then
            mkdir -p /tmp/apk-extract
            tar -xzf "$APK_FILE" -C /tmp/apk-extract 2>/dev/null || true
            if [ -d /tmp/apk-extract/usr/share/paranoid-passwd/site ]; then
              cp -r /tmp/apk-extract/usr/share/paranoid-passwd/site/* artifact/site/
            fi
            if [ -f /tmp/apk-extract/usr/share/paranoid-passwd/site/paranoid.wasm ]; then
              cp /tmp/apk-extract/usr/share/paranoid-passwd/site/paranoid.wasm artifact/
            fi
          fi

          # Fallback to a direct build if melange extraction didn't yield
          # the expected tree.
          if [ ! -f artifact/paranoid.wasm ]; then
            cmake -B build/wasm \
                -DCMAKE_TOOLCHAIN_FILE=cmake/wasm32-wasi.cmake \
                -DCMAKE_BUILD_TYPE=Release
            cmake --build build/wasm
            [ -f build/wasm/paranoid ] && [ ! -f build/wasm/paranoid.wasm ] \
                && mv build/wasm/paranoid build/wasm/paranoid.wasm
            cp build/wasm/paranoid.wasm artifact/
            cp www/index.html www/style.css www/app.js www/CNAME artifact/site/
            cp build/wasm/paranoid.wasm artifact/site/
          fi

          echo "wasm-sha256=$(sha256sum artifact/paranoid.wasm | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push + sign OCI image
        env:
          RELEASE_VERSION: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          crane push output.tar "${REGISTRY}/${IMAGE_NAME}:${RELEASE_VERSION}"
          crane push output.tar "${REGISTRY}/${IMAGE_NAME}:latest"
          cosign sign --yes "${REGISTRY}/${IMAGE_NAME}:${RELEASE_VERSION}"

      - name: Upload site artifact (for cd.yml Pages deploy)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: paranoid-site-release
          path: artifact/site/
          retention-days: 90

      - name: Upload WASM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: paranoid-wasm-release
          path: artifact/paranoid.wasm
          retention-days: 90

  # ─── Attest everything, upload release assets ──────────────────
  attest-and-publish:
    name: Attest + Publish Release Assets
    needs: [build-cli, build-site]
    runs-on: ubuntu-24.04
    permissions:
      contents: write       # upload release assets
      id-token: write       # sigstore OIDC
      attestations: write   # attest-build-provenance
    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: cli-dist
          merge-multiple: true

      - name: Download WASM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: paranoid-wasm-release
          path: wasm-dist

      - name: Download site
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: paranoid-site-release
          path: site-dist

      - name: Combine CLI checksums
        run: |
          cd cli-dist
          cat ./*.sha256 > checksums.txt
          rm -f ./*.sha256

      - name: Package site zip
        env:
          RAW_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          ver="${RAW_TAG#paranoid-passwd-v}"
          (cd site-dist && zip -r "../paranoid-site-${ver}.zip" . >/dev/null)
          cp wasm-dist/paranoid.wasm "paranoid-${ver}.wasm"

      - name: Attest CLI tarballs + checksums
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            cli-dist/*.tar.gz
            cli-dist/*.zip
            cli-dist/checksums.txt

      - name: Attest WASM
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: wasm-dist/paranoid.wasm

      - name: Upload everything to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RAW_TAG: ${{ github.event.release.tag_name || inputs.tag }}
          GH_REPO: ${{ github.repository }}
        run: |
          ver="${RAW_TAG#paranoid-passwd-v}"
          gh release upload "${RAW_TAG}" \
              cli-dist/*.tar.gz cli-dist/*.zip cli-dist/checksums.txt \
              "paranoid-${ver}.wasm" "paranoid-site-${ver}.zip" \
              --repo "${GH_REPO}" --clobber

  # ─── Publish package manifests to jbcom/pkgs + tap ─────────────
  publish-packages:
    name: Publish to jbcom/pkgs
    needs: attest-and-publish
    if: github.event_name == 'release'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout (for scripts)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve version
        id: ver
        env:
          RAW_TAG: ${{ github.event.release.tag_name }}
        run: echo "version=${RAW_TAG#paranoid-passwd-v}" >> "$GITHUB_OUTPUT"

      - name: Download checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
        run: gh release download "${TAG}" -p checksums.txt --repo "${GH_REPO}"

      - name: Generate manifests
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          ./scripts/generate_pkg_manifests.sh "${VERSION}" checksums.txt out/

      - name: Push to jbcom/pkgs
        env:
          TOKEN: ${{ secrets.JBCOM_PKGS_GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/jbcom/pkgs.git" pkgs
          cd pkgs
          mkdir -p Formula bucket choco/paranoid-passwd/tools
          cp ../out/paranoid-passwd.rb Formula/
          cp ../out/paranoid-passwd.json bucket/
          cp ../out/paranoid-passwd.nuspec choco/paranoid-passwd/
          cp ../out/chocolateyInstall.ps1 ../out/VERIFICATION.txt \
              choco/paranoid-passwd/tools/
          git config user.name  'jbcom-bot'
          git config user.email 'noreply@jonbogaty.com'
          git add Formula/paranoid-passwd.rb bucket/paranoid-passwd.json \
                  choco/paranoid-passwd
          git diff --cached --quiet || \
              git commit -m "feat(paranoid-passwd): bump to ${VERSION}"
          git push

      - name: Push Homebrew tap mirror to jbcom/homebrew-tap
        env:
          TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/jbcom/homebrew-tap.git" tap
          cd tap
          mkdir -p Formula
          cp ../out/paranoid-passwd.rb Formula/
          git config user.name  'jbcom-bot'
          git config user.email 'noreply@jonbogaty.com'
          git add Formula/paranoid-passwd.rb
          git diff --cached --quiet || \
              git commit -m "feat(paranoid-passwd): bump to ${VERSION}"
          git push

  # ─── Install smoke test (linux-amd64) ──────────────────────────
  install-smoke-test:
    name: Install Smoke Test (linux-amd64)
    needs: attest-and-publish
    if: github.event_name == 'release'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download + verify + run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RAW_TAG: ${{ github.event.release.tag_name }}
          OWNER: ${{ github.repository_owner }}
        run: |
          ver="${RAW_TAG#paranoid-passwd-v}"
          tarball="paranoid-passwd-${ver}-linux-amd64.tar.gz"
          stage="paranoid-passwd-${ver}-linux-amd64"
          gh release download "${RAW_TAG}" -p "${tarball}" -p checksums.txt --repo "${GH_REPO}"
          gh attestation verify "${tarball}" --owner "${OWNER}"
          grep " ${tarball}$" checksums.txt | sha256sum -c -
          tar xzf "${tarball}"
          out=$("./${stage}/paranoid-passwd" --version)
          echo "${out}" | grep -F "${ver}"
          lines=$("./${stage}/paranoid-passwd" --length 16 --count 3 --no-audit --quiet | wc -l)
          test "${lines}" = "3"
