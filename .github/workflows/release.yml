name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. paranoid-passwd-v3.7.0)'
        required: true
        type: string
      release_signing_mode:
        description: 'Release signing mode: unsigned or signed'
        required: false
        default: unsigned
        type: choice
        options:
          - unsigned
          - signed

permissions: {}

env:
  PARANOID_RELEASE_SIGNING_MODE: ${{ inputs.release_signing_mode || vars.PARANOID_RELEASE_SIGNING_MODE || 'unsigned' }}
  PARANOID_WIX_VERSION: 7.0.0

jobs:
  build-native:
    name: Build ${{ matrix.target_os }}/${{ matrix.target_arch }}
    if: >
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.release.tag_name, 'paranoid-passwd-v')
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target_os: linux
            target_arch: amd64
            ext: ""
            archive: tar.gz
          - runner: ubuntu-24.04-arm
            target_os: linux
            target_arch: arm64
            ext: ""
            archive: tar.gz
          - runner: macos-15-intel
            target_os: darwin
            target_arch: amd64
            ext: ""
            archive: tar.gz
          - runner: macos-14
            target_os: darwin
            target_arch: arm64
            ext: ""
            archive: tar.gz
          - runner: windows-2022
            target_os: windows
            target_arch: amd64
            ext: ".exe"
            archive: zip

    steps:
      - name: Checkout release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          persist-credentials: false

      - name: Extract version
        id: ver
        shell: bash
        env:
          RAW_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: echo "version=${RAW_TAG#paranoid-passwd-v}" >> "$GITHUB_OUTPUT"

      - name: Resolve commit SHA
        id: commit
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install OpenSSL build dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install openssl@3 pkg-config
          {
            echo "OPENSSL_DIR=$(brew --prefix openssl@3)"
            echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig"
          } >> "$GITHUB_ENV"

      - name: Import macOS signing certificate
        if: runner.os == 'macOS'
        shell: bash
        env:
          PARANOID_MACOS_CODESIGN_IDENTITY: ${{ secrets.PARANOID_MACOS_CODESIGN_IDENTITY }}
          PARANOID_MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.PARANOID_MACOS_CERTIFICATE_P12_BASE64 }}
          PARANOID_MACOS_CERTIFICATE_PASSWORD: ${{ secrets.PARANOID_MACOS_CERTIFICATE_PASSWORD }}
          PARANOID_MACOS_KEYCHAIN_PASSWORD: ${{ secrets.PARANOID_MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [ "${PARANOID_RELEASE_SIGNING_MODE}" != "signed" ]; then
            echo "macOS release signing mode is unsigned; skipping certificate import"
            exit 0
          fi
          if [ -z "${PARANOID_MACOS_CODESIGN_IDENTITY:-}" ]; then
            echo "::error::PARANOID_MACOS_CODESIGN_IDENTITY is required when PARANOID_RELEASE_SIGNING_MODE=signed"
            exit 1
          fi
          if [ -z "${PARANOID_MACOS_CERTIFICATE_P12_BASE64:-}" ]; then
            echo "::notice::No PARANOID_MACOS_CERTIFICATE_P12_BASE64 secret was provided; relying on an existing runner keychain identity"
            exit 0
          fi
          if [ -z "${PARANOID_MACOS_CERTIFICATE_PASSWORD:-}" ]; then
            echo "::error::PARANOID_MACOS_CERTIFICATE_PASSWORD is required when importing a macOS signing certificate"
            exit 1
          fi
          keychain="${RUNNER_TEMP}/paranoid-signing.keychain-db"
          cert_path="${RUNNER_TEMP}/paranoid-signing.p12"
          keychain_password="${PARANOID_MACOS_KEYCHAIN_PASSWORD:-}"
          if [ -z "${keychain_password}" ]; then
            keychain_password="$(openssl rand -hex 24)"
          fi
          printf '%s' "${PARANOID_MACOS_CERTIFICATE_P12_BASE64}" | base64 -D > "${cert_path}"
          security create-keychain -p "${keychain_password}" "${keychain}"
          security set-keychain-settings -lut 21600 "${keychain}"
          security unlock-keychain -p "${keychain_password}" "${keychain}"
          security import "${cert_path}" -k "${keychain}" -P "${PARANOID_MACOS_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "${keychain}"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${keychain_password}" "${keychain}"

      - name: Prepare macOS notarization credentials
        if: runner.os == 'macOS'
        shell: bash
        env:
          PARANOID_MACOS_NOTARY_KEYCHAIN_PROFILE: ${{ secrets.PARANOID_MACOS_NOTARY_KEYCHAIN_PROFILE }}
          PARANOID_MACOS_NOTARY_KEY_P8_BASE64: ${{ secrets.PARANOID_MACOS_NOTARY_KEY_P8_BASE64 }}
          PARANOID_MACOS_NOTARY_KEY_ID: ${{ secrets.PARANOID_MACOS_NOTARY_KEY_ID }}
          PARANOID_MACOS_NOTARY_ISSUER: ${{ secrets.PARANOID_MACOS_NOTARY_ISSUER }}
        run: |
          if [ "${PARANOID_RELEASE_SIGNING_MODE}" != "signed" ]; then
            echo "macOS release signing mode is unsigned; skipping notarization credential preparation"
            exit 0
          fi
          if [ -n "${PARANOID_MACOS_NOTARY_KEYCHAIN_PROFILE:-}" ]; then
            echo "Using configured macOS notarization keychain profile"
            exit 0
          fi
          if [ -z "${PARANOID_MACOS_NOTARY_KEY_P8_BASE64:-}" ]; then
            echo "::error::PARANOID_MACOS_NOTARY_KEYCHAIN_PROFILE or PARANOID_MACOS_NOTARY_KEY_P8_BASE64 is required when PARANOID_RELEASE_SIGNING_MODE=signed"
            exit 1
          fi
          if [ -z "${PARANOID_MACOS_NOTARY_KEY_ID:-}" ] || [ -z "${PARANOID_MACOS_NOTARY_ISSUER:-}" ]; then
            echo "::error::PARANOID_MACOS_NOTARY_KEY_ID and PARANOID_MACOS_NOTARY_ISSUER are required with PARANOID_MACOS_NOTARY_KEY_P8_BASE64"
            exit 1
          fi
          notary_key_path="${RUNNER_TEMP}/paranoid-notary-key.p8"
          printf '%s' "${PARANOID_MACOS_NOTARY_KEY_P8_BASE64}" | base64 -D > "${notary_key_path}"
          chmod 600 "${notary_key_path}"
          {
            echo "PARANOID_MACOS_NOTARY_KEY_PATH=${notary_key_path}"
            echo "PARANOID_MACOS_NOTARY_KEY_ID=${PARANOID_MACOS_NOTARY_KEY_ID}"
            echo "PARANOID_MACOS_NOTARY_ISSUER=${PARANOID_MACOS_NOTARY_ISSUER}"
          } >> "$GITHUB_ENV"

      - name: Install OpenSSL build dependencies (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          & "C:\vcpkg\vcpkg.exe" install openssl:x64-windows-static-md
          "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OPENSSL_NO_VENDOR=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install WiX Toolset (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $nugetConfig = Join-Path $env:RUNNER_TEMP "wix-nuget.config"
          @"
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <config>
              <add key="signatureValidationMode" value="require" />
            </config>
            <trustedSigners>
              <author name="firegiant">
                <certificate fingerprint="D95336DD2022934D80E3F3A4F938DD66EC7076BBBA680F76C11F2B54B346D61D" hashAlgorithm="SHA256" allowUntrustedRoot="false" />
              </author>
            </trustedSigners>
          </configuration>
          "@ | Set-Content -Path $nugetConfig -Encoding utf8
          dotnet tool install --global wix --version $env:PARANOID_WIX_VERSION --configfile $nugetConfig
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$env:USERPROFILE\.dotnet\tools\wix.exe" --version

      - name: Import Windows signing certificate
        if: runner.os == 'Windows'
        shell: powershell
        env:
          PARANOID_WINDOWS_SIGNTOOL_CERT_SHA1: ${{ secrets.PARANOID_WINDOWS_SIGNTOOL_CERT_SHA1 }}
          PARANOID_WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.PARANOID_WINDOWS_CERTIFICATE_PFX_BASE64 }}
          PARANOID_WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.PARANOID_WINDOWS_CERTIFICATE_PASSWORD }}
          PARANOID_WINDOWS_SIGNTOOL_TIMESTAMP_URL: ${{ secrets.PARANOID_WINDOWS_SIGNTOOL_TIMESTAMP_URL }}
        run: |
          if ($env:PARANOID_RELEASE_SIGNING_MODE -ne "signed") {
            Write-Host "Windows release signing mode is unsigned; skipping certificate import"
            exit 0
          }
          if ($env:PARANOID_WINDOWS_SIGNTOOL_CERT_SHA1) {
            "PARANOID_WINDOWS_SIGNTOOL_CERT_SHA1=$env:PARANOID_WINDOWS_SIGNTOOL_CERT_SHA1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            if (-not $env:PARANOID_WINDOWS_CERTIFICATE_PFX_BASE64) {
              Write-Error "PARANOID_WINDOWS_SIGNTOOL_CERT_SHA1 or PARANOID_WINDOWS_CERTIFICATE_PFX_BASE64 is required when PARANOID_RELEASE_SIGNING_MODE=signed"
              exit 1
            }
            if (-not $env:PARANOID_WINDOWS_CERTIFICATE_PASSWORD) {
              Write-Error "PARANOID_WINDOWS_CERTIFICATE_PASSWORD is required when importing a Windows signing certificate"
              exit 1
            }
            $certPath = Join-Path $env:RUNNER_TEMP "paranoid-windows-signing.pfx"
            [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:PARANOID_WINDOWS_CERTIFICATE_PFX_BASE64))
            $password = ConvertTo-SecureString -String $env:PARANOID_WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
            $cert = Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $password
            if (-not $cert.Thumbprint) {
              Write-Error "Windows signing certificate import did not return a thumbprint"
              exit 1
            }
            "PARANOID_WINDOWS_SIGNTOOL_CERT_SHA1=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          if ($env:PARANOID_WINDOWS_SIGNTOOL_TIMESTAMP_URL) {
            if ($env:PARANOID_WINDOWS_SIGNTOOL_TIMESTAMP_URL -notmatch '^https://') {
              Write-Error "PARANOID_WINDOWS_SIGNTOOL_TIMESTAMP_URL must use https://"
              exit 1
            }
            "PARANOID_WINDOWS_SIGNTOOL_TIMESTAMP_URL=$env:PARANOID_WINDOWS_SIGNTOOL_TIMESTAMP_URL" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Build + package + smoke test inside the builder
        if: runner.os == 'Linux'
        uses: ./.github/actions/builder
        with:
          run: |
            export PARANOID_CLI_BUILD_COMMIT='${{ steps.commit.outputs.sha }}'
            export PARANOID_CLI_BUILD_DATE='${{ github.event.release.published_at || github.event.repository.updated_at }}'
            export PARANOID_GUI_BUILD_COMMIT='${{ steps.commit.outputs.sha }}'
            export PARANOID_GUI_BUILD_DATE='${{ github.event.release.published_at || github.event.repository.updated_at }}'
            mkdir -p dist/release
            bash scripts/build_release_artifact.sh '${{ steps.ver.outputs.version }}' '${{ matrix.target_os }}' '${{ matrix.target_arch }}' '${{ matrix.ext }}' '${{ matrix.archive }}' dist/release
            bash scripts/smoke_test_release_artifact.sh '${{ steps.ver.outputs.version }}' '${{ matrix.target_os }}' '${{ matrix.target_arch }}' 'dist/release/paranoid-passwd-${{ steps.ver.outputs.version }}-${{ matrix.target_os }}-${{ matrix.target_arch }}.${{ matrix.archive }}'
            bash scripts/build_release_artifact.sh '${{ steps.ver.outputs.version }}' '${{ matrix.target_os }}' '${{ matrix.target_arch }}' '${{ matrix.ext }}' deb dist/release
            bash scripts/smoke_test_release_artifact.sh '${{ steps.ver.outputs.version }}' '${{ matrix.target_os }}' '${{ matrix.target_arch }}' 'dist/release/paranoid-passwd_${{ steps.ver.outputs.version }}_${{ matrix.target_arch }}.deb'
            bash scripts/build_release_artifact.sh '${{ steps.ver.outputs.version }}' '${{ matrix.target_os }}' '${{ matrix.target_arch }}' '${{ matrix.ext }}' '${{ matrix.archive }}' dist/release paranoid-passwd-gui paranoid-gui
            bash scripts/smoke_test_release_artifact.sh '${{ steps.ver.outputs.version }}' '${{ matrix.target_os }}' '${{ matrix.target_arch }}' 'dist/release/paranoid-passwd-gui-${{ steps.ver.outputs.version }}-${{ matrix.target_os }}-${{ matrix.target_arch }}.${{ matrix.archive }}' paranoid-passwd-gui
            bash scripts/build_release_artifact.sh '${{ steps.ver.outputs.version }}' '${{ matrix.target_os }}' '${{ matrix.target_arch }}' '${{ matrix.ext }}' deb dist/release paranoid-passwd-gui paranoid-gui
            bash scripts/smoke_test_release_artifact.sh '${{ steps.ver.outputs.version }}' '${{ matrix.target_os }}' '${{ matrix.target_arch }}' 'dist/release/paranoid-passwd-gui_${{ steps.ver.outputs.version }}_${{ matrix.target_arch }}.deb' paranoid-passwd-gui

      - name: Build + package + smoke test on native runner
        if: runner.os != 'Linux'
        shell: bash
        env:
          PARANOID_CLI_BUILD_COMMIT: ${{ steps.commit.outputs.sha }}
          PARANOID_CLI_BUILD_DATE: ${{ github.event.release.published_at || github.event.repository.updated_at }}
          PARANOID_GUI_BUILD_COMMIT: ${{ steps.commit.outputs.sha }}
          PARANOID_GUI_BUILD_DATE: ${{ github.event.release.published_at || github.event.repository.updated_at }}
          PARANOID_MACOS_CODESIGN_IDENTITY: ${{ secrets.PARANOID_MACOS_CODESIGN_IDENTITY }}
          PARANOID_MACOS_NOTARY_KEYCHAIN_PROFILE: ${{ secrets.PARANOID_MACOS_NOTARY_KEYCHAIN_PROFILE }}
        run: |
          mkdir -p dist/release
          bash scripts/build_release_artifact.sh '${{ steps.ver.outputs.version }}' '${{ matrix.target_os }}' '${{ matrix.target_arch }}' '${{ matrix.ext }}' '${{ matrix.archive }}' dist/release
          bash scripts/smoke_test_release_artifact.sh '${{ steps.ver.outputs.version }}' '${{ matrix.target_os }}' '${{ matrix.target_arch }}' "dist/release/paranoid-passwd-${{ steps.ver.outputs.version }}-${{ matrix.target_os }}-${{ matrix.target_arch }}.${{ matrix.archive }}"
          bash scripts/build_release_artifact.sh '${{ steps.ver.outputs.version }}' '${{ matrix.target_os }}' '${{ matrix.target_arch }}' '${{ matrix.ext }}' '${{ matrix.archive }}' dist/release paranoid-passwd-gui paranoid-gui
          bash scripts/smoke_test_release_artifact.sh '${{ steps.ver.outputs.version }}' '${{ matrix.target_os }}' '${{ matrix.target_arch }}' "dist/release/paranoid-passwd-gui-${{ steps.ver.outputs.version }}-${{ matrix.target_os }}-${{ matrix.target_arch }}.${{ matrix.archive }}" paranoid-passwd-gui
          if [ '${{ matrix.target_os }}' = 'darwin' ]; then
            bash scripts/build_release_artifact.sh '${{ steps.ver.outputs.version }}' '${{ matrix.target_os }}' '${{ matrix.target_arch }}' '${{ matrix.ext }}' dmg dist/release paranoid-passwd-gui paranoid-gui
            bash scripts/smoke_test_release_artifact.sh '${{ steps.ver.outputs.version }}' '${{ matrix.target_os }}' '${{ matrix.target_arch }}' "dist/release/paranoid-passwd-gui-${{ steps.ver.outputs.version }}-${{ matrix.target_os }}-${{ matrix.target_arch }}.dmg" paranoid-passwd-gui
          elif [ '${{ matrix.target_os }}' = 'windows' ]; then
            bash scripts/build_release_artifact.sh '${{ steps.ver.outputs.version }}' '${{ matrix.target_os }}' '${{ matrix.target_arch }}' '${{ matrix.ext }}' msi dist/release paranoid-passwd-gui paranoid-gui
            bash scripts/smoke_test_release_artifact.sh '${{ steps.ver.outputs.version }}' '${{ matrix.target_os }}' '${{ matrix.target_arch }}' "dist/release/paranoid-passwd-gui-${{ steps.ver.outputs.version }}-${{ matrix.target_os }}-${{ matrix.target_arch }}.msi" paranoid-passwd-gui
          fi

      - name: Upload native artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: |
            dist/release/*.tar.gz
            dist/release/*.zip
            dist/release/*.deb
            dist/release/*.dmg
            dist/release/*.msi
            dist/release/*.sha256
          retention-days: 7

  release-validate:
    name: Validate Release Inputs
    needs: build-native
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout (for scripts and installer)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          persist-credentials: false

      - name: Extract version
        id: ver
        shell: bash
        env:
          RAW_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: echo "version=${RAW_TAG#paranoid-passwd-v}" >> "$GITHUB_OUTPUT"

      - name: Download native artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: cli-dist
          merge-multiple: true

      - name: Validate artifacts, manifests, and install.sh
        uses: ./.github/actions/builder
        env:
          PARANOID_RELEASE_SIGNING_ALLOW_HOST_DEFERRED: "1"
          PARANOID_MSI_ALLOW_HOST_DEFERRED: "1"
        with:
          run: |
            bash scripts/release_validate.sh '${{ steps.ver.outputs.version }}' cli-dist

      - name: Upload validated package manifests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-manifests
          path: cli-dist/pkg
          retention-days: 7

  attest-and-publish:
    name: Attest + Publish Release Assets
    needs: release-validate
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download native artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: cli-dist
          merge-multiple: true

      - name: Combine checksums
        shell: bash
        run: |
          cd cli-dist
          cat ./*.sha256 > checksums.txt.raw
          awk '
            NF >= 2 {
              artifact = $2
              sub(/^\*/, "", artifact)
              sub(/^.*\//, "", artifact)
              print $1 "  " artifact
              next
            }
            { exit 1 }
          ' checksums.txt.raw > checksums.txt
          rm -f checksums.txt.raw
          rm -f ./*.sha256

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            cli-dist/*.tar.gz
            cli-dist/*.zip
            cli-dist/*.deb
            cli-dist/*.dmg
            cli-dist/*.msi
            cli-dist/checksums.txt

      - name: Upload everything to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RAW_TAG: ${{ github.event.release.tag_name || inputs.tag }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "${RAW_TAG}" \
              cli-dist/*.tar.gz cli-dist/*.zip cli-dist/*.deb cli-dist/*.dmg cli-dist/*.msi cli-dist/checksums.txt \
              --repo "${GH_REPO}" --clobber

  release-surface-verify:
    name: Verify Published Release Surface (${{ matrix.verify_host }})
    needs: attest-and-publish
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - verify_host: linux
            runner: ubuntu-24.04
          - verify_host: darwin
            runner: macos-14
          - verify_host: windows
            runner: windows-2022
    steps:
      - name: Checkout (for verification scripts)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          persist-credentials: false

      - name: Verify expected assets, checksums, attestation, and smoke path (Linux)
        if: matrix.verify_host == 'linux'
        uses: ./.github/actions/builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RAW_TAG: ${{ github.event.release.tag_name || inputs.tag }}
          OWNER: ${{ github.repository_owner }}
          PARANOID_REQUIRE_WINDOWS_MSI: "1"
          PARANOID_MSI_ALLOW_HOST_DEFERRED: "1"
        with:
          run: |
            bash scripts/verify_published_release.sh "${RAW_TAG}" "${GH_REPO}" "${OWNER}"

      - name: Verify expected assets, checksums, attestation, and smoke path (macOS)
        if: matrix.verify_host == 'darwin'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RAW_TAG: ${{ github.event.release.tag_name || inputs.tag }}
          OWNER: ${{ github.repository_owner }}
          PARANOID_REQUIRE_WINDOWS_MSI: "1"
          PARANOID_MSI_ALLOW_HOST_DEFERRED: "1"
        run: |
          bash scripts/verify_published_release.sh "${RAW_TAG}" "${GH_REPO}" "${OWNER}"

      - name: Verify expected assets, checksums, attestation, and smoke path (Windows)
        if: matrix.verify_host == 'windows'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RAW_TAG: ${{ github.event.release.tag_name || inputs.tag }}
          OWNER: ${{ github.repository_owner }}
          PARANOID_REQUIRE_WINDOWS_MSI: "1"
        run: |
          bash scripts/verify_published_release.sh "${RAW_TAG}" "${GH_REPO}" "${OWNER}"

  publish-packages:
    name: Publish to jbcom/pkgs
    needs:
      - release-validate
      - attest-and-publish
      - release-surface-verify
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout (for scripts)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Resolve version
        id: ver
        shell: bash
        env:
          RAW_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: echo "version=${RAW_TAG#paranoid-passwd-v}" >> "$GITHUB_OUTPUT"

      - name: Download validated manifests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: package-manifests
          path: out

      - name: Open PR against jbcom/pkgs
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/jbcom/pkgs.git" pkgs
          cd pkgs
          branch="paranoid-passwd/bump-${VERSION}"
          git checkout -b "${branch}"
          mkdir -p Formula bucket choco/paranoid-passwd/tools
          cp ../out/paranoid-passwd.rb Formula/
          cp ../out/paranoid-passwd.json bucket/
          cp ../out/paranoid-passwd.nuspec choco/paranoid-passwd/
          cp ../out/chocolateyInstall.ps1 ../out/VERIFICATION.txt choco/paranoid-passwd/tools/
          git config user.name "jbcom-bot"
          git config user.email "noreply@jonbogaty.com"
          git add Formula/paranoid-passwd.rb bucket/paranoid-passwd.json choco/paranoid-passwd
          if git diff --cached --quiet; then
            echo "No manifest changes for ${VERSION} — skipping PR"
            exit 0
          fi
          git commit -m "feat(paranoid-passwd): bump to ${VERSION}"
          git push -u origin "${branch}"
          gh pr create \
              --repo jbcom/pkgs \
              --base main \
              --head "${branch}" \
              --title "feat(paranoid-passwd): bump to ${VERSION}" \
              --body "Auto-generated from paranoid-passwd release pipeline for v${VERSION}."
          gh pr merge --repo jbcom/pkgs --auto --squash "${branch}"

  release-download-verify:
