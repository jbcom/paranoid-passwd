          gh release download "${RAW_TAG}" -p "${artifact}" -p checksums.txt --repo "${GH_REPO}"
          gh attestation verify "${artifact}" --owner "${OWNER}"
          checksum_line="$(awk -v artifact="${artifact}" '$2 == artifact { print; found = 1 } END { if (!found) exit 1 }' checksums.txt)"
          if command -v sha256sum >/dev/null 2>&1; then
            printf '%s\n' "${checksum_line}" | sha256sum -c -
          else
            printf '%s\n' "${checksum_line}" | shasum -a 256 -c -
          fi
          bash scripts/verify_platform_signing.sh \
            --mode "${PARANOID_RELEASE_SIGNING_MODE:-unsigned}" \
            --artifact "${artifact}" \
            --product '${{ matrix.product_name }}'
          if [ "${RUNNABLE}" = "true" ]; then
            bash scripts/smoke_test_release_artifact.sh "${ver}" '${{ matrix.target_os }}' '${{ matrix.target_arch }}' "${artifact}" '${{ matrix.product_name }}'
          fi
