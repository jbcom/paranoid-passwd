        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RAW_TAG: ${{ github.event.release.tag_name || inputs.tag }}
          OWNER: ${{ github.repository_owner }}
          RUNNABLE: ${{ matrix.runnable }}
        run: |
          ver="${RAW_TAG#paranoid-passwd-v}"
          if [ '${{ matrix.deb }}' = 'true' ]; then
            artifact="${{ matrix.product_name }}_${ver}_${{ matrix.target_arch }}.deb"
          else
            artifact="${{ matrix.product_name }}-${ver}-${{ matrix.asset_suffix }}"
