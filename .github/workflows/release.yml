name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. paranoid-passwd-v3.5.1)'
        required: true
        type: string

permissions: {}

jobs:
  build-native:
    name: Build ${{ matrix.target_os }}/${{ matrix.target_arch }}
    if: >
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.release.tag_name, 'paranoid-passwd-v')
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target_os: linux
            target_arch: amd64
            ext: ""
            archive: tar.gz
          - runner: ubuntu-24.04-arm
            target_os: linux
            target_arch: arm64
            ext: ""
            archive: tar.gz
          - runner: macos-13
            target_os: darwin
            target_arch: amd64
            ext: ""
            archive: tar.gz
          - runner: macos-14
            target_os: darwin
            target_arch: arm64
            ext: ""
            archive: tar.gz
          - runner: windows-2022
            target_os: windows
            target_arch: amd64
            ext: ".exe"
            archive: zip

    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          persist-credentials: false

      - name: Extract version
        id: ver
        shell: bash
        env:
          RAW_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: echo "version=${RAW_TAG#paranoid-passwd-v}" >> "$GITHUB_OUTPUT"

      - name: Resolve commit SHA
        id: commit
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install OpenSSL build dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install openssl@3 pkg-config
          {
            echo "OPENSSL_DIR=$(brew --prefix openssl@3)"
            echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig"
          } >> "$GITHUB_ENV"

      - name: Install OpenSSL build dependencies (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          & "C:\vcpkg\vcpkg.exe" install openssl:x64-windows-static-md
          "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OPENSSL_NO_VENDOR=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build + package + smoke test inside the builder
        if: runner.os == 'Linux'
        uses: ./.github/actions/builder
        with:
          run: |
            export PARANOID_CLI_BUILD_COMMIT='${{ steps.commit.outputs.sha }}'
            export PARANOID_CLI_BUILD_DATE='${{ github.event.release.published_at || github.event.repository.updated_at }}'
            mkdir -p dist/release
            bash scripts/build_release_artifact.sh '${{ steps.ver.outputs.version }}' '${{ matrix.target_os }}' '${{ matrix.target_arch }}' '${{ matrix.ext }}' '${{ matrix.archive }}' dist/release
            bash scripts/smoke_test_release_artifact.sh '${{ steps.ver.outputs.version }}' '${{ matrix.target_os }}' '${{ matrix.target_arch }}' 'dist/release/paranoid-passwd-${{ steps.ver.outputs.version }}-${{ matrix.target_os }}-${{ matrix.target_arch }}.${{ matrix.archive }}'

      - name: Build + package + smoke test on native runner
        if: runner.os != 'Linux'
        shell: bash
        env:
          PARANOID_CLI_BUILD_COMMIT: ${{ steps.commit.outputs.sha }}
          PARANOID_CLI_BUILD_DATE: ${{ github.event.release.published_at || github.event.repository.updated_at }}
        run: |
          mkdir -p dist/release
          bash scripts/build_release_artifact.sh '${{ steps.ver.outputs.version }}' '${{ matrix.target_os }}' '${{ matrix.target_arch }}' '${{ matrix.ext }}' '${{ matrix.archive }}' dist/release
          bash scripts/smoke_test_release_artifact.sh '${{ steps.ver.outputs.version }}' '${{ matrix.target_os }}' '${{ matrix.target_arch }}' "dist/release/paranoid-passwd-${{ steps.ver.outputs.version }}-${{ matrix.target_os }}-${{ matrix.target_arch }}.${{ matrix.archive }}"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-${{ matrix.target_os }}-${{ matrix.target_arch }}
          path: |
            dist/release/paranoid-passwd-${{ steps.ver.outputs.version }}-${{ matrix.target_os }}-${{ matrix.target_arch }}.${{ matrix.archive }}
            dist/release/paranoid-passwd-${{ steps.ver.outputs.version }}-${{ matrix.target_os }}-${{ matrix.target_arch }}.${{ matrix.archive }}.sha256
          retention-days: 7

  release-validate:
    name: Validate Release Inputs
    needs: build-native
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout (for scripts and installer)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          persist-credentials: false

      - name: Extract version
        id: ver
        shell: bash
        env:
          RAW_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: echo "version=${RAW_TAG#paranoid-passwd-v}" >> "$GITHUB_OUTPUT"

      - name: Download CLI artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: cli-dist
          merge-multiple: true

      - name: Validate archives, manifests, and install.sh
        shell: bash
        run: |
          bash scripts/release_validate.sh '${{ steps.ver.outputs.version }}' cli-dist

      - name: Upload validated package manifests
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-manifests
          path: cli-dist/pkg
          retention-days: 7

  attest-and-publish:
    name: Attest + Publish Release Assets
    needs: release-validate
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: cli-dist
          merge-multiple: true

      - name: Combine checksums
        shell: bash
        run: |
          cd cli-dist
          cat ./*.sha256 > checksums.txt
          rm -f ./*.sha256

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            cli-dist/*.tar.gz
            cli-dist/*.zip
            cli-dist/checksums.txt

      - name: Upload everything to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RAW_TAG: ${{ github.event.release.tag_name || inputs.tag }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "${RAW_TAG}" \
              cli-dist/*.tar.gz cli-dist/*.zip cli-dist/checksums.txt \
              --repo "${GH_REPO}" --clobber

  publish-packages:
    name: Publish to jbcom/pkgs
    needs:
      - release-validate
      - attest-and-publish
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout (for scripts)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve version
        id: ver
        shell: bash
        env:
          RAW_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: echo "version=${RAW_TAG#paranoid-passwd-v}" >> "$GITHUB_OUTPUT"

      - name: Download validated manifests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: package-manifests
          path: out

      - name: Open PR against jbcom/pkgs
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/jbcom/pkgs.git" pkgs
          cd pkgs
          branch="paranoid-passwd/bump-${VERSION}"
          git checkout -b "${branch}"
          mkdir -p Formula bucket choco/paranoid-passwd/tools
          cp ../out/paranoid-passwd.rb Formula/
          cp ../out/paranoid-passwd.json bucket/
          cp ../out/paranoid-passwd.nuspec choco/paranoid-passwd/
          cp ../out/chocolateyInstall.ps1 ../out/VERIFICATION.txt choco/paranoid-passwd/tools/
          git config user.name "jbcom-bot"
          git config user.email "noreply@jonbogaty.com"
          git add Formula/paranoid-passwd.rb bucket/paranoid-passwd.json choco/paranoid-passwd
          if git diff --cached --quiet; then
            echo "No manifest changes for ${VERSION} — skipping PR"
            exit 0
          fi
          git commit -m "feat(paranoid-passwd): bump to ${VERSION}"
          git push -u origin "${branch}"
          gh pr create \
              --repo jbcom/pkgs \
              --base main \
              --head "${branch}" \
              --title "feat(paranoid-passwd): bump to ${VERSION}" \
              --body "Auto-generated from paranoid-passwd release pipeline for v${VERSION}."
          gh pr merge --repo jbcom/pkgs --auto --squash "${branch}"

      - name: Open PR against jbcom/homebrew-tap
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/jbcom/homebrew-tap.git" tap
          cd tap
          branch="paranoid-passwd/bump-${VERSION}"
          git checkout -b "${branch}"
          mkdir -p Formula
          cp ../out/paranoid-passwd.rb Formula/
          git config user.name "jbcom-bot"
          git config user.email "noreply@jonbogaty.com"
          git add Formula/paranoid-passwd.rb
          if git diff --cached --quiet; then
            echo "No formula changes for ${VERSION} — skipping PR"
            exit 0
          fi
          git commit -m "feat(paranoid-passwd): bump to ${VERSION}"
          git push -u origin "${branch}"
          gh pr create \
              --repo jbcom/homebrew-tap \
              --base main \
              --head "${branch}" \
              --title "feat(paranoid-passwd): bump to ${VERSION}" \
              --body "Auto-generated Homebrew formula bump for paranoid-passwd v${VERSION}."
          gh pr merge --repo jbcom/homebrew-tap --auto --squash "${branch}"

  release-download-verify:
    name: Release Download Verification (${{ matrix.target_os }}/${{ matrix.target_arch }})
    needs: attest-and-publish
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_os: linux
            target_arch: amd64
            archive: tar.gz
            runnable: true
          - target_os: linux
            target_arch: arm64
            archive: tar.gz
            runnable: false
          - target_os: darwin
            target_arch: amd64
            archive: tar.gz
            runnable: false
          - target_os: darwin
            target_arch: arm64
            archive: tar.gz
            runnable: false
          - target_os: windows
            target_arch: amd64
            archive: zip
            runnable: false
    steps:
      - name: Download + verify release asset
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RAW_TAG: ${{ github.event.release.tag_name || inputs.tag }}
          OWNER: ${{ github.repository_owner }}
          RUNNABLE: ${{ matrix.runnable }}
        run: |
          ver="${RAW_TAG#paranoid-passwd-v}"
          artifact="paranoid-passwd-${ver}-${{ matrix.target_os }}-${{ matrix.target_arch }}.${{ matrix.archive }}"
          gh release download "${RAW_TAG}" -p "${artifact}" -p checksums.txt --repo "${GH_REPO}"
          gh attestation verify "${artifact}" --owner "${OWNER}"
          grep " ${artifact}$" checksums.txt | sha256sum -c -
          if [ "${RUNNABLE}" = "true" ]; then
            bash scripts/smoke_test_release_artifact.sh "${ver}" '${{ matrix.target_os }}' '${{ matrix.target_arch }}' "${artifact}"
          fi
