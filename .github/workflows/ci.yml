# -----------------------------------------------------------------
# paranoid-passwd -- CI Pipeline
#
# RUNS ON: All pull requests AND push:main
# PURPOSE: Full verification including native tests, WASM build, E2E,
#          static analysis (CodeQL, SonarCloud, ShellCheck), LLM
#          hallucination detection, supply-chain checks, and OpenSSF
#          Scorecard (push:main only).
#
# SUPPLY CHAIN MODEL:
#   Toolchain runs inside the Wolfi-pinned builder action at
#   .github/actions/builder/. No apt-get for cmake/wabt/zig. One trust
#   root: Wolfi (via cgr.dev/chainguard/wolfi-base).
#
#   Other guarantees:
#   - All GitHub Actions SHA-pinned (not tags)
#   - acutest pinned by commit SHA
#   - CodeQL + SonarCloud + ShellCheck static analysis
#   - LLM hallucination detection
#   - Supply chain verification
#   - OpenSSF Scorecard on push:main (formerly a separate workflow)
# -----------------------------------------------------------------

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # acutest v1.7.5 (2024-01-14) — pinned by SHA for supply chain security
  ACUTEST_SHA: "31751b4089c93b46a9fd8a8183a695f772de66de"

jobs:

  # ---------------------------------------------------------------
  # JOB 1: Native Build + Tests (CMake + CTest, inside Wolfi)
  # ---------------------------------------------------------------
  native-test:
    name: Native Build + Tests
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Clone acutest (SHA-pinned)
        env:
          ACUTEST_SHA_ENV: ${{ env.ACUTEST_SHA }}
        run: |
          mkdir -p vendor
          git clone https://github.com/mity/acutest.git vendor/acutest
          cd vendor/acutest && git checkout "${ACUTEST_SHA_ENV}"

      - name: Native build + CTest inside Wolfi builder
        uses: ./.github/actions/builder
        with:
          run: |
            cmake -B build/native -DCMAKE_BUILD_TYPE=Debug
            cmake --build build/native
            ctest --test-dir build/native --output-on-failure

  # ---------------------------------------------------------------
  # JOB 2: WASM Build (CMake + wasm32-wasi via Zig, inside Wolfi)
  # ---------------------------------------------------------------
  wasm-build:
    name: WASM Build + Validate
    runs-on: ubuntu-24.04
    needs: native-test

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: WASM build + validate inside Wolfi builder
        uses: ./.github/actions/builder
        with:
          run: |
            cmake -B build/wasm \
                -DCMAKE_TOOLCHAIN_FILE=cmake/wasm32-wasi.cmake \
                -DCMAKE_BUILD_TYPE=Release
            cmake --build build/wasm

            # Normalize output name: -mexec-model=reactor may produce
            # "paranoid" without .wasm extension on some Zig versions.
            if [ -f build/wasm/paranoid ] && [ ! -f build/wasm/paranoid.wasm ]; then
                mv build/wasm/paranoid build/wasm/paranoid.wasm
            fi

            echo "=== Validating WASM binary ==="
            wasm-validate build/wasm/paranoid.wasm

            echo "=== Required exports ==="
            for fn in paranoid_version paranoid_generate paranoid_run_audit \
                      paranoid_get_result_ptr paranoid_get_result_size \
                      paranoid_sha256 paranoid_sha256_hex \
                      paranoid_chi_squared paranoid_serial_correlation \
                      paranoid_count_collisions malloc free; do
                if wasm-objdump -x build/wasm/paranoid.wasm 2>/dev/null | grep -q "<${fn}>"; then
                    echo "  OK: ${fn}"
                else
                    echo "  MISSING: ${fn}"; exit 1
                fi
            done

            echo "=== Import namespaces ==="
            NAMESPACES=$(wasm-objdump -x build/wasm/paranoid.wasm 2>/dev/null | \
                grep " <- " | \
                sed 's/.*<- \([^.]*\)\..*/\1/' | sort -u)
            for ns in $NAMESPACES; do
                if [ "$ns" = "wasi_snapshot_preview1" ]; then
                    echo "  OK: $ns"
                else
                    echo "  UNEXPECTED: $ns"; exit 1
                fi
            done

            echo "=== Binary size ==="
            SIZE=$(stat -c%s build/wasm/paranoid.wasm)
            echo "WASM binary size: ${SIZE} bytes"
            SHA=$(sha256sum build/wasm/paranoid.wasm | cut -d' ' -f1)
            echo "WASM SHA-256: ${SHA}"

      - name: Upload WASM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: paranoid-wasm
          path: build/wasm/paranoid.wasm
          retention-days: 7

  # ---------------------------------------------------------------
  # JOB 3: E2E Tests (Playwright)
  #
  # Runs on the host (not Wolfi) because Playwright bundles its own
  # browser binaries via setup-node + npx. Wolfi doesn't materially
  # help here — the trust chain is npm + Playwright.
  # ---------------------------------------------------------------
  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-24.04
    needs: wasm-build

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download WASM artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: paranoid-wasm
          path: build/wasm

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Assemble site
        run: |
          mkdir -p build/site
          cp www/index.html www/style.css www/app.js build/site/
          cp build/wasm/paranoid.wasm build/site/

      - name: Install Playwright
        working-directory: tests/e2e
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Start server and run E2E tests
        working-directory: tests/e2e
        run: |
          # Static file server in the background.
          python3 -m http.server 8080 --directory ../../build/site &
          SERVER_PID=$!
          sleep 2

          # Run Playwright tests (chromium only in CI).
          npx playwright test --project chromium \
              || { kill $SERVER_PID 2>/dev/null; exit 1; }

          kill $SERVER_PID 2>/dev/null || true

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/
          retention-days: 7

  # ---------------------------------------------------------------
  # JOB 4: CodeQL Analysis
  #
  # Folded in from the standalone codeql.yml workflow (now deleted).
  # Single CodeQL run per PR/push, with SARIF upload to Code Scanning.
  # ---------------------------------------------------------------
  codeql:
    name: CodeQL
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [c-cpp, javascript]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18
        with:
          category: "/language:${{ matrix.language }}"

  # ---------------------------------------------------------------
  # JOB 5: SonarCloud
  # ---------------------------------------------------------------
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-24.04
    # Dependabot PRs do not receive repository secrets, so SONAR_TOKEN
    # is empty and the scan fails. Skip SonarCloud for Dependabot
    # actor — CodeQL still runs and provides static-analysis coverage.
    if: github.actor != 'dependabot[bot]'

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8 # v5.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ---------------------------------------------------------------
  # JOB 6: ShellCheck
  # ---------------------------------------------------------------
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck on all scripts
        run: |
          echo "Running ShellCheck on scripts/*.sh..."
          FAILED=0
          for script in scripts/*.sh; do
              echo "  Checking $script..."
              if ! shellcheck -x "$script"; then
                  FAILED=1
              fi
          done
          if [ "$FAILED" -ne 0 ]; then
              echo "ShellCheck found issues."
              exit 1
          fi
          echo "All scripts passed ShellCheck."

  # ---------------------------------------------------------------
  # JOB 7: Hallucination Check
  # ---------------------------------------------------------------
  hallucination-check:
    name: Hallucination Check
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run hallucination check
        run: ./scripts/hallucination_check.sh

  # ---------------------------------------------------------------
  # JOB 8: Supply Chain Verification
  # ---------------------------------------------------------------
  supply-chain-verify:
    name: Supply Chain Verify
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run supply chain verification
        run: ./scripts/supply_chain_verify.sh

  # ---------------------------------------------------------------
  # JOB 9: OpenSSF Scorecard (push:main only)
  #
  # Folded in from the standalone scorecard.yml workflow (now deleted).
  # Skipped on PRs because the upload step requires the repo's OIDC
  # identity that PRs don't have, and the upload would fail with
  # HTTP 400 on every PR.
  # ---------------------------------------------------------------
  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      security-events: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard results artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 14

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18
        with:
          sarif_file: results.sarif
