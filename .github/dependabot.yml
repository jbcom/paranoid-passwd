# -----------------------------------------------------------------
# paranoid-passwd -- Dependabot Configuration
#
# Automated dependency updates for GitHub Actions.
#
# Cargo crates are deliberately excluded from Dependabot PR automation because this
# repository replaces crates.io with the checked-in vendor/ tree. Dependabot's Cargo
# updater cannot maintain vendored Cargo sources, so Cargo dependency updates must
# be re-vendored by a maintainer and proven with locked/frozen/offline Cargo gates.
# -----------------------------------------------------------------

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"
