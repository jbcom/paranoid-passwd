# -----------------------------------------------------------------
# paranoid-passwd -- Dependabot Configuration
#
# Automated dependency updates for:
#   - GitHub Actions
#   - Cargo workspace crates
# -----------------------------------------------------------------

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Etc/UTC"
    groups:
      rust-deps:
        patterns: ["*"]
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "rust"
