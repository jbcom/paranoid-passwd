[tox]
requires = tox==4.53.0
env_list = docs, docs-linkcheck
skipsdist = true

[testenv:docs]
description = Build the docs/download site and generated Rust API pages.
allowlist_externals = bash
deps =
    sphinx==7.4.7
    shibuya==2026.1.9
    myst-parser==4.0.1
    linkify-it-py==2.1.0
    sphinxcontrib-rust==1.1.0
commands =
    bash scripts/validate-docs.sh
    bash -lc 'rm -rf docs/_build/html docs/api/crates'
    sphinx-build -b html docs docs/_build/html

[testenv:docs-linkcheck]
description = Validate outbound documentation links without coupling to the live Pages deployment.
allowlist_externals = bash
deps =
    sphinx==7.4.7
    shibuya==2026.1.9
    myst-parser==4.0.1
    linkify-it-py==2.1.0
    sphinxcontrib-rust==1.1.0
commands =
    bash scripts/validate-docs.sh
    bash -lc 'rm -rf docs/_build/linkcheck docs/api/crates'
    sphinx-build -b linkcheck docs docs/_build/linkcheck
