[package]
edition = "2024"
rust-version = "1.88"
name = "iced"
version = "0.14.0"
authors = ["Héctor Ramón Jiménez <hector@hecrj.dev>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A cross-platform GUI library inspired by Elm"
homepage = "https://iced.rs"
readme = "README.md"
keywords = [
    "gui",
    "ui",
    "graphics",
    "interface",
    "widgets",
]
categories = ["gui"]
license = "MIT"
repository = "https://github.com/iced-rs/iced"

[package.metadata.docs.rs]
rustdoc-args = [
    "--cfg",
    "docsrs",
]
all-features = true

[badges.maintenance]
status = "actively-developed"

[features]
