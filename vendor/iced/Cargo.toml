    "iced_core/crisp",
    "iced_widget/crisp",
]
debug = [
    "iced_winit/debug",
    "dep:iced_devtools",
]
default = [
    "wgpu",
    "tiny-skia",
    "crisp",
    "web-colors",
    "thread-pool",
    "linux-theme-detection",
    "x11",
    "wayland",
]
fira-sans = ["iced_renderer/fira-sans"]
highlighter = [
    "iced_highlighter",
    "iced_widget/highlighter",
]
hot = [
    "debug",
    "iced_debug/hot",
]
image = [
    "image-without-codecs",
    "image/default",
]
image-without-codecs = [
    "iced_widget/image",
    "dep:image",
]
lazy = ["iced_widget/lazy"]
linux-theme-detection = ["iced_winit/linux-theme-detection"]
markdown = ["iced_widget/markdown"]
qr_code = ["iced_widget/qr_code"]
selector = ["iced_runtime/selector"]
sipper = ["iced_runtime/sipper"]
smol = ["iced_futures/smol"]
strict-assertions = ["iced_renderer/strict-assertions"]
svg = ["iced_widget/svg"]
sysinfo = ["iced_winit/sysinfo"]
tester = ["dep:iced_tester"]
thread-pool = ["iced_futures/thread-pool"]
time-travel = [
    "debug",
    "iced_devtools/time-travel",
]
tiny-skia = ["iced_renderer/tiny-skia"]
tokio = ["iced_futures/tokio"]
unconditional-rendering = ["iced_winit/unconditional-rendering"]
wayland = [
    "iced_renderer/wayland",
    "iced_winit/wayland",
]
web-colors = ["iced_renderer/web-colors"]
webgl = ["iced_renderer/webgl"]
wgpu = [
    "wgpu-bare",
    "iced_renderer/wgpu",
]
